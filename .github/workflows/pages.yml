name: Refresh and publish dashboard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore monitor history
        uses: actions/cache@v4
        with:
          path: data
          key: airline-watch-data-${{ github.run_id }}
          restore-keys: |
            airline-watch-data-

      - name: Install Airline Watch
        run: pip install .

      - name: Refresh dashboard
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AIRLINE_WATCH_MODEL: gpt-5.5
        run: ./scripts/monitor.sh

      - name: Disable Jekyll processing
        run: touch outputs/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v4
        with:
          path: outputs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
