sources:
  - name: FAA Newsroom
    kind: news_page
    tier: regulator
    url: https://www.faa.gov/newsroom
    topics: [policy, safety_regulatory, operations]
    article_paths:
      - "^/newsroom/faa-(proposes|establishes|issues|announces|requires|orders)"
      - "^/newsroom/trumps-transportation-secretary"

  - name: U.S. DOT Briefing Room
    kind: news_page
    tier: regulator
    url: https://www.transportation.gov/briefing-room
    topics: [policy, customer_experience]
    article_paths: ["^/briefing-room/"]

  - name: NTSB Newsroom
    kind: news_page
    tier: regulator
    url: https://www.ntsb.gov/news/Pages/default.aspx
    topics: [safety_regulatory]
    article_paths: ["^/news/press-releases/"]

  - name: IATA Pressroom
    kind: news_page
    tier: industry
    url: https://www.iata.org/en/pressroom/
    topics: [policy, operations, financial_strategy]
    article_paths: ["^/en/pressroom/20"]
    exclude_title_keywords: ["awards announced"]

  - name: Airlines for America
    kind: news_page
    tier: industry
    url: https://www.airlines.org/news/
    topics: [policy, operations]
    article_paths: ["^/news/"]

  - name: Delta News Hub
    kind: news_page
    tier: official
    url: https://news.delta.com/
    topics: [leadership, fleet_aircraft, operations, customer_experience]
    article_paths: ["^/.*[0-9]{4}"]

  - name: United Newsroom
    kind: news_page
    tier: official
